			shellPath = /bin/sh;
			shellScript = "set -eu\n\nMODEL_DIR=\"${SRCROOT}/falken/Models\"\nEXPECTED_MODEL=\"${MODEL_DIR}/google_gemma-3-1b-it-Q4_K_M.gguf\"\nSTAMP_FILE=\"${DERIVED_FILE_DIR}/validate-local-model-resources.stamp\"\n\nif [ ! -f \"${EXPECTED_MODEL}\" ]; then\n  echo \"error: Missing expected GGUF model: ${EXPECTED_MODEL}\" >&2\n  exit 1\nfi\n\nGGUF_COUNT=$(find \"${MODEL_DIR}\" -maxdepth 1 -type f -name '*.gguf' | wc -l | tr -d ' ')\nif [ \"${GGUF_COUNT}\" != \"1\" ]; then\n  echo \"error: Expected exactly one GGUF model in ${MODEL_DIR}; found ${GGUF_COUNT}.\" >&2\n  exit 1\nfi\n\nif [ -d \"${MODEL_DIR}/.cache\" ]; then\n  CACHE_FILES=$(find \"${MODEL_DIR}/.cache\" -type f 2>/dev/null | wc -l | tr -d ' ')\n  if [ \"${CACHE_FILES}\" != \"0\" ]; then\n    echo \"error: Remove Hugging Face cache files from ${MODEL_DIR}/.cache before building.\" >&2\n    exit 1\n  fi\nfi\n\nEXTRA_METADATA=$(find \"${MODEL_DIR}\" -maxdepth 1 -type f \\( -name '*.lock' -o -name '*.metadata' \\) | wc -l | tr -d ' ')\nif [ \"${EXTRA_METADATA}\" != \"0\" ]; then\n  echo \"error: Model cache metadata files should not be bundled.\" >&2\n  exit 1\nfi\n\ntouch \"${STAMP_FILE}\"\n";
